<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Space Dashboard</title>

  <!--
    normalize.css resets browser inconsistencies so spacing and typography are
    more predictable across Chrome, Firefox, Edge, and Safari.
  -->
  <link rel="stylesheet" href="css/normalize.css">

  <!--
    Main site stylesheet.
    This file handles the grid layout, panel cards, loader styling, table design,
    and CSS fallback animations.
  -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!--
    WRAPPER
    A centered container that gives the page a max-width and keeps the dashboard
    readable on very large screens.
  -->
  <div class="wrapper">
    <!--
      HERO / HEADER
      The hero explains the concept of the project: multiple NASA API-driven panels,
      safer caching, animation, and a fourth Moon Rover section.
    -->
    <header class="site-header">
      <section class="hero">
        <div class="hero-content">
          <h1 class="hero-title">NASA Space Dashboard</h1>
          <p class="hero-tagline">Keep Up-To-Date with Space and the cool robots we send up there</p>
        </div>
      </section>
    </header>

    <!--
      MAIN GRID
      The dashboard uses a four-panel grid. On medium widths it collapses into a
      2x2 layout, and on wide screens it becomes four columns.
    -->
    <main>
      <div class="panels-grid panels-grid--four">
        <!--
          APOD PANEL
          Featured NASA content using the Astronomy Picture of the Day endpoint.
        -->
        <section id="panel-apod" class="panel" data-state="loading">
          <h2>Astronomy Picture of the Day</h2>
          <div class="panel__loader" aria-hidden="true"></div>
          <div class="panel__error" hidden></div>
          <div class="panel__content"></div>
        </section>

        <!--
          MARS PANEL
          NASA Image and Video Library search results for Mars rover imagery.
        -->
        <section id="panel-mars" class="panel" data-state="loading">
          <h2>Mars Rover Photos</h2>
          <div class="panel__loader" aria-hidden="true"></div>
          <div class="panel__error" hidden></div>
          <div class="panel__content"></div>
        </section>

        <!--
          NEO PANEL
          JSON data rendered into a table so numeric comparisons are easy to read.
        -->
        <section id="panel-neo" class="panel" data-state="loading">
          <h2>Near Earth Objects</h2>
          <div class="panel__loader" aria-hidden="true"></div>
          <div class="panel__error" hidden></div>
          <div class="panel__content"></div>
        </section>

        <!--
          MOON PANEL
          A fourth panel added so the dashboard can collapse into a 2x2 grid while
          still staying on-theme with NASA rover/media content.
        -->
        <section id="panel-moon" class="panel" data-state="loading">
          <h2>Moon Rover Media</h2>
          <div class="panel__loader" aria-hidden="true"></div>
          <div class="panel__error" hidden></div>
          <div class="panel__content"></div>
        </section>
      </div>
    </main>

    <!--
      FOOTER
      Includes a live API status line so the user can tell whether the page is
      using a local server correctly and how the NASA requests are behaving.
    -->
    <footer class="site-footer">
      <p>Data provided by NASA Open APIs and NASA media search endpoints.</p>
      <p id="api-status">Checking API status…</p>
    </footer>
  </div>

  <!--
    POPMOTION
    Loaded from a CDN because the assignment specifically asks for a Popmotion
    animation. The script.js file uses stagger, tween, composite, and framesync.
  -->
  <script src="https://unpkg.com/popmotion@11.0.3/dist/popmotion.global.min.js"></script>

  <!--
    MAIN APPLICATION SCRIPT
    Handles fetch(), caching, DOM rendering, lazy loading, and animations.
  -->
  <script src="script.js"></script>
</body>
</html>
